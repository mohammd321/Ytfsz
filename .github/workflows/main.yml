name: Android-Cloud
on: workflow_dispatch

jobs:
  android-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and Start Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscaled &
          sleep 5
          sudo tailscale up --accept-routes || true

      - name: Run Android Container
        run: |
          docker run -d \
            --name android-container \
            --privileged \
            --network host \
            -e EMULATOR_DEVICE="Samsung Galaxy S10" \
            -e WEB_VNC=true \
            budtmo/docker-android:emulator_9.0

      - name: Keep Alive
        run: sleep 21600
